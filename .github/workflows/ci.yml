name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      # Builds on mock data: the app no-ops Supabase when unconfigured, so no
      # secrets are required here. Integration tests (tests/integration) need a
      # local DB and self-skip without one — see tests/integration/README.md.
      - name: Build
        run: npm run build
